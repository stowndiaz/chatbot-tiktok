<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Telemetry Overlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@400;500;700&family=Rajdhani:wght@500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <main class="overlay">
        <section class="panel panel-chat">
            <header class="panel-title">
                <span class="material-symbols-rounded">chat</span>
                <span>Live Chat</span>
            </header>
            <ul id="chatList" class="chat-list"></ul>
        </section>

        <section class="panel-like-visualizer">
            <div id="heartsLayer" class="hearts-layer">
                <div class="lane lane-youtube"></div>
                <div class="lane lane-tiktok"></div>
            </div>
        </section>
    </main>
    <script src="/app.js"></script>
</body>
</html>
